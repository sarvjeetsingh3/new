name: Artifact Workflow

on:
  push:

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: echo "hello world" > file.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: file.txt

  job2:
    needs: job1
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: Display file
        run: cat file.txt