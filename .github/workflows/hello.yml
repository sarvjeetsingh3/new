name: My First Workflow

on: [push, pull_request]

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Hello, Github Actions!"
        
      - name: Print my name
        run: echo "Vansh"
  
  say-bye:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "GoodBye from second job"